<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Somya AI Video Background</title>

<style>

body{
background:#0f172a;
color:white;
text-align:center;
font-family:Arial;
padding:40px;
}

video,canvas{
width:350px;
border-radius:10px;
margin-top:20px;
}

button{
padding:12px 25px;
margin-top:20px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Somya AI Video Background Changer</h1>

<input type="file" id="upload" accept="video/*">

<br>

<video id="video" controls></video>

<br>

<button onclick="startAI()">Start AI Background</button>

<canvas id="canvas"></canvas>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

document.getElementById("upload").onchange=function(e){
video.src=URL.createObjectURL(e.target.files[0])
}

function startAI(){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const bg=new Image()
bg.src="https://images.unsplash.com/photo-1501785888041-af3ef285b470"

function draw(){

ctx.drawImage(bg,0,0,canvas.width,canvas.height)

ctx.globalCompositeOperation="destination-atop"

ctx.drawImage(video,0,0,canvas.width,canvas.height)

requestAnimationFrame(draw)

}

draw()

}

</script>

</body>
</html>
