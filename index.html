<!DOCTYPE html>
<html>
<head>
    <title>Kids Learning World 🌍</title>
    <!-- Animation CSS -->
    <link href="https://unpkg.com" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f0f8ff;
            overflow-x: hidden; /* Scroll animation ke liye */
        }
        header {
            background: linear-gradient(45deg, #ff7b00, #ffcc00);
            color: white;
            text-align: center;
            padding: 40px;
        }
        nav {
            background: #333;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 18px;
        }
        nav a:hover {
            color: yellow;
        }
        .banner {
            text-align: center;
            padding: 60px;
            background: #fff3cd;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            width: 220px;
            margin: 15px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-10px);
        }
        .card img {
            width: 120px;
        }
        section {
            padding: 40px;
            text-align: center;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }
        button {
            background: #ff7b00;
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #ff5500;
        }
        /* Contact Form Style */
        .contact-form input, .contact-form textarea {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header data-aos="fade-down">
    <h1>Kids Learning World 🌍</h1>
    <!-- Typing Animation Section -->
    <p style="font-size: 20px; font-weight: bold;">Fun Learning - <span id="typing-text" style="color: #333;"></span></p>
</header>

<nav>
    <a href="#abc">ABC</a>
    <a href="#numbers">Numbers</a>
    <a href="#stories">Stories</a>
    <a href="#contact">Contact</a>
</nav>

<div class="banner" data-aos="zoom-in">
    <h2>Welcome to the World of Learning!</h2>
    <p>Chalo milkar kuch naya seekhte hain.</p>
</div>

<div class="container">
    <!-- Card 1 -->
    <div class="card" data-aos="fade-up" data-aos-delay="100">
        <img src="https://flaticon.com" alt="ABC">
        <h3>Learn ABC</h3>
        <button>Start</button>
    </div>
    <!-- Card 2 -->
    <div class="card" data-aos="fade-up" data-aos-delay="200">
        <img src="https://flaticon.com" alt="Numbers">
        <h3>Learn Numbers</h3>
        <button>Start</button>
    </div>
</div>

<!-- Naya Contact Section -->
<section id="contact" data-aos="fade-up">
    <h2>Humein Contact Karein</h2>
    <form class="contact-form" action="https://formspree.io" method="POST">
        <input type="text" name="name" placeholder="Aapka Naam" required><br>
        <input type="email" name="email" placeholder="Aapki Email" required><br>
        <textarea name="message" placeholder="Aapka Message"></textarea><br>
        <button type="submit">Message Bheinjein</button>
    </form>
</section>

<footer>
    <p>&copy; 2026 Kids Learning World | Made with ❤️</p>
</footer>

<!-- Scripts: AOS aur Typed.js -->
<script src="https://unpkg.com"></script>
<script src="https://unpkg.com"></script>

<script>
    // 1. Scroll Animation Start
    AOS.init({ duration: 1000, once: true });

    // 2. Typing Effect Start
    var typed = new Typed('#typing-text', {
        strings: ['ABC Learning', 'Number Counting', 'Hindi Stories', 'Fun Games'],
        typeSpeed: 60,
        backSpeed: 40,
        loop: true
    });
</script>

</body>
</html>
