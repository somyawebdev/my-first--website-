<script>

let currentColor = "red";
let isDrawing = false;
let canvas, ctx;

// Speech
function speak(text){
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "hi-IN";
    speechSynthesis.speak(utter);
}

function speakEnglish(text){
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "en-US";
    speechSynthesis.speak(utter);
}

// Section show
function showSection(id){
    document.querySelectorAll(".section").forEach(sec=>{
        sec.style.display="none";
    });

    document.getElementById(id).style.display="block";

    if(id==="numbers") generateNumbers();
    if(id==="hindi") generateHindi();
    if(id==="english") generateEnglish();
    if(id==="drawing") initCanvas();
}

// Numbers
function generateNumbers(){
    const grid=document.getElementById("numbersGrid");
    grid.innerHTML="";

    for(let i=1;i<=100;i++){
        let btn=document.createElement("button");
        btn.className="btn";
        btn.innerHTML="🔢<br>"+i;
        btn.onclick=()=>speakEnglish(i);
        grid.appendChild(btn);
    }
}

// Hindi
function generateHindi(){

const letters=['क','ख','ग','घ','ङ','च','छ','ज','झ','ञ','ट','ठ','ड','ढ','ण','त','थ','द','ध','न','प','फ','ब','भ','म','य','र','ल','व','श','ष','स','ह','क्ष','त्र','ज्ञ'];

const grid=document.getElementById("hindiGrid");
grid.innerHTML="";

letters.forEach(l=>{
let btn=document.createElement("button");
btn.className="btn";
btn.innerHTML="📖<br>"+l;
btn.onclick=()=>speak(l);
grid.appendChild(btn);
});
}

// English
function generateEnglish(){

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

const grid=document.getElementById("englishGrid");
grid.innerHTML="";

letters.forEach(l=>{
let btn=document.createElement("button");
btn.className="btn";
btn.innerHTML="📘<br>"+l;
btn.onclick=()=>speakEnglish(l);
grid.appendChild(btn);
});
}

// Stories
function playStory(story){

const box=document.getElementById("storyContent");

let text="";

switch(story){

case "pratap":
text="महाराणा प्रताप मेवाड़ के वीर राजा थे। उन्होंने मुगलों के सामने कभी हार नहीं मानी। उन्होंने अपने देश और स्वाभिमान की रक्षा के लिए कठिन जीवन भी स्वीकार किया।";
break;

case "ramayan":
text="रामायण भगवान राम की कहानी है। राम ने रावण को हराकर सीता माता को वापस लाया और दुनिया को सच्चाई का रास्ता दिखाया।";
break;

case "mahabharat":
text="महाभारत पांडवों और कौरवों की महान कहानी है। इसमें सिखाया गया है कि सत्य और धर्म की हमेशा जीत होती है।";
break;

case "gita":
text="भगवद गीता में भगवान कृष्ण ने अर्जुन को जीवन का ज्ञान दिया और बताया कि हमें अपना कर्तव्य ईमानदारी से करना चाहिए।";
break;

}

box.innerText=text;
box.style.display="block";

speak(text);
}

// Animals
function playAnimal(name){

const sounds={
dog:"भौं भौं",
cat:"म्याऊ",
cow:"माँ",
lion:"गर्रर",
monkey:"ऊ ऊ",
elephant:"पॉं"
};

speak(sounds[name]||name);
}

// Rhymes
function playRhyme(name){

let text="";

if(name==="twinkle"){
text="Twinkle twinkle little star how I wonder what you are";
}

if(name==="johnny"){
text="Johnny Johnny yes papa eating sugar no papa";
}

if(name==="wheels"){
text="The wheels on the bus go round and round";
}

speakEnglish(text);
}

// Drawing
function initCanvas(){

const area=document.getElementById("canvas");

area.innerHTML="<canvas id='drawCanvas' width='900' height='400'></canvas>";

canvas=document.getElementById("drawCanvas");
ctx=canvas.getContext("2d");

canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("mousemove",draw);

canvas.addEventListener("touchstart",startDraw);
canvas.addEventListener("touchend",stopDraw);
canvas.addEventListener("touchmove",draw);
}

function startDraw(e){
isDrawing=true;
ctx.beginPath();
}

function stopDraw(){
isDrawing=false;
}

function draw(e){

if(!isDrawing) return;

let rect=canvas.getBoundingClientRect();

let x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
let y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

ctx.lineWidth=5;
ctx.lineCap="round";
ctx.strokeStyle=currentColor;

ctx.lineTo(x,y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(x,y);
}

// Color
function setColor(color){
currentColor=color;
}

// Clear
function clearCanvas(){
if(ctx){
ctx.clearRect(0,0,canvas.width,canvas.height);
}
}

// Games
function startMatchingGame(){
alert("Matching Game coming soon 🎮");
}

function startColorGame(){
alert("Color Game coming soon 🎨");
}

function startShapePuzzle(){
alert("Shape Puzzle coming soon 🔷");
}

        </script>
