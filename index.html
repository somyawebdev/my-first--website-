<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Learning App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fecfef);
min-height:100vh;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#ff4d4d;
margin-bottom:20px;
}

.section{
display:none;
background:white;
padding:25px;
border-radius:20px;
margin:20px 0;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.section.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
}

.btn{
background:linear-gradient(45deg,#ff6b6b,#ffd93d);
border:none;
border-radius:20px;
padding:20px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
}

.nav-buttons{
text-align:center;
}

.nav-btn{
background:#4ecdc4;
color:white;
border:none;
padding:10px 18px;
margin:5px;
border-radius:20px;
cursor:pointer;
}

.story-text{
margin-top:20px;
padding:20px;
background:#f2f2f2;
border-radius:10px;
}

canvas{
border:3px solid black;
border-radius:10px;
background:white;
}

.color-btn{
width:40px;
height:40px;
border-radius:50%;
border:3px solid white;
display:inline-block;
margin:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Baby Learning App</h1>

<div class="nav-buttons">

<button class="nav-btn" onclick="showSection('numbers')">Numbers</button>
<button class="nav-btn" onclick="showSection('hindi')">Hindi</button>
<button class="nav-btn" onclick="showSection('english')">English</button>
<button class="nav-btn" onclick="showSection('stories')">Stories</button>
<button class="nav-btn" onclick="showSection('animals')">Animals</button>
<button class="nav-btn" onclick="showSection('drawing')">Drawing</button>

</div>

<div id="numbers" class="section">
<h2>Numbers 1-100</h2>
<div class="grid" id="numbersGrid"></div>
</div>

<div id="hindi" class="section">
<h2>Hindi Alphabet</h2>
<div class="grid" id="hindiGrid"></div>
</div>

<div id="english" class="section">
<h2>English ABC</h2>
<div class="grid" id="englishGrid"></div>
</div>

<div id="stories" class="section">

<h2>Stories</h2>

<div class="grid">

<button class="btn" onclick="playStory('pratap')">Maharana Pratap</button>
<button class="btn" onclick="playStory('ramayan')">Ramayan</button>
<button class="btn" onclick="playStory('mahabharat')">Mahabharat</button>
<button class="btn" onclick="playStory('gita')">Bhagavad Gita</button>

</div>

<div id="storyContent" class="story-text"></div>

</div>

<div id="animals" class="section">

<h2>Animals</h2>

<div class="grid">

<button class="btn" onclick="playAnimal('Dog says woof')">🐶 Dog</button>
<button class="btn" onclick="playAnimal('Cat says meow')">🐱 Cat</button>
<button class="btn" onclick="playAnimal('Cow says moo')">🐄 Cow</button>
<button class="btn" onclick="playAnimal('Lion roars')">🦁 Lion</button>
<button class="btn" onclick="playAnimal('Elephant sound')">🐘 Elephant</button>
<button class="btn" onclick="playAnimal('Monkey sound')">🐒 Monkey</button>

</div>

</div>

<div id="drawing" class="section">

<h2>Drawing Board</h2>

<canvas id="canvas" width="800" height="400"></canvas>

<br><br>

<div>

<div class="color-btn" style="background:red" onclick="setColor('red')"></div>
<div class="color-btn" style="background:blue" onclick="setColor('blue')"></div>
