<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Learning World - Full</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background: #fff9e6; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .section { background: white; border-radius: 25px; padding: 20px; margin: 20px 0; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 4px solid #ffcc00; }
        h2 { color: #ff4500; font-size: 28px; border-bottom: 2px dashed #ff4500; padding-bottom: 10px; }
        
        /* Bade Buttons */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; }
        button { 
            padding: 20px; font-size: 22px; cursor: pointer; border: none; 
            border-radius: 20px; background: #FFD700; transition: 0.3s;
            box-shadow: 0 6px #b8860b; font-weight: bold; display: flex; flex-direction: column; align-items: center;
        }
        button:active { box-shadow: 0 0; transform: translateY(4px); }
        button img { width: 50px; height: 50px; margin-bottom: 10px; }

        /* Story Style */
        .story-btn { background: #ffebcc; width: 100%; margin: 10px 0; padding: 25px; font-size: 24px; text-align: left; }
        .story-btn:hover { background: #ffd180; }
        
        .manner-good { background: #d4edda; color: #155724; }
        .manner-bad { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎨 Kids Learning App 🎨</h1>

    <!-- 1. Counting Section -->
    <div class="section">
        <h2>🔢 1 to 100 Counting</h2>
        <div class="grid" id="count-div"></div>
    </div>

    <!-- 2. Hindi Varnmala -->
    <div class="section">
        <h2>🕉️ क से ज्ञ तक</h2>
        <div class="grid" id="hindi-div"></div>
    </div>

    <!-- 3. Stories Section (History & Mythology) -->
    <div class="section">
        <h2>📖 कहानियाँ (Stories with Voice)</h2>
        
        <button class="story-btn" onclick="speakStory('महाराणा प्रताप', 'महाराणा प्रताप मेवाड़ के वीर राजा थे। उनके पास एक बहादुर घोड़ा था जिसका नाम चेतक था। उन्होंने कभी हार नहीं मानी और हल्दीघाटी के युद्ध में बहादुरी से लड़े।')">
            🛡️ महाराणा प्रताप की कहानी
        </button>

        <button class="story-btn" onclick="speakStory('रामायण', 'रामायण भगवान श्री राम की कहानी है। राम जी ने माता सीता को रावण की कैद से छुड़ाने के लिए लंका पर चढ़ाई की और बुराई का अंत किया।')">
            🏹 रामायण की कहानी
        </button>

        <button class="story-btn" onclick="speakStory('महाभारत', 'महाभारत पांडवों और कौरवों के बीच धर्म का युद्ध था। इसमें भगवान कृष्ण ने अर्जुन के सारथी बनकर उन्हें जीत दिलाई।')">
            ⚔️ महाभारत की कहानी
        </button>

        <button class="story-btn" onclick="speakStory('भगवत गीता', 'भगवत गीता में भगवान कृष्ण ने कर्म करने का संदेश दिया है। उन्होंने कहा कि फल की चिंता किए बिना अपना कर्तव्य निभाओ।')">
            ☸️ भगवत गीता का ज्ञान
        </button>
    </div>

    <!-- 4. Good & Bad Manners -->
    <div class="section">
        <h2>🌈 Good & Bad Manners</h2>
        <div class="grid">
            <button class="manner-good" onclick="speak('Good Manner: Always say Thank You and Sorry')">🤝 Thank You / Sorry</button>
            <button class="manner-good" onclick="speak('Good Manner: Brush your teeth twice a day')">🪥 Brush Daily</button>
            <button class="manner-bad" onclick="speak('Bad Manner: Do not bite your nails')">💅 Nail Biting</button>
            <button class="manner-bad" onclick="speak('Bad Manner: Never tell a lie')">🤥 Telling Lies</button>
        </div>
    </div>

    <!-- 5. Colors & Animals -->
    <div class="section">
        <h2>🐶 Animals & 🎨 Colors</h2>
        <div class="grid">
            <button style="background: red; color:white;" onclick="speak('Red Color')">🍎 RED</button>
            <button style="background: blue; color:white;" onclick="speak('Blue Color')">🌊 BLUE</button>
            <button onclick="speak('Lion')">🦁 LION</button>
            <button onclick="speak('Elephant')">🐘 ELEPHANT</button>
        </div>
    </div>

    <!-- 6. Rhymes Section -->
    <div class="section">
        <h2>🎵 Kids Rhymes</h2>
        <button class="story-btn" onclick="speak('Twinkle twinkle little star, how I wonder what you are')">⭐ Twinkle Twinkle</button>
        <button class="story-btn" onclick="speak('Johny Johny Yes Papa, Eating sugar? No papa')">🍭 Johny Johny</button>
    </div>
</div>

<script>
    // Voice Function
    function speak(text) {
        let msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'hi-IN'; // Indian Hindi/English Voice
        window.speechSynthesis.speak(msg);
    }

    function speakStory(title, detail) {
        speak(title + "... " + detail);
    }

    // 1-100 Loop
    const countDiv = document.getElementById('count-div');
    for(let i=1; i<=100; i++) {
        let b = document.createElement('button');
        b.innerText = i;
        b.onclick = () => speak(i);
        countDiv.appendChild(b);
    }

    // Hindi Characters
    const varns = ['क','ख','ग','घ','ङ','च','छ','ज','झ','ञ','ट','ठ','ड','ढ','ण','त','थ','द','ध','न','प','फ','ब','भ','म','य','र','ल','व','श','ष','स','ह','क्ष','त्र','ज्ञ'];
    const hindiDiv = document.getElementById('hindi-div');
    varns.forEach(v => {
        let b = document.createElement('button');
        b.innerText = v;
        b.onclick = () => speak(v);
        hindiDiv.appendChild(b);
    });
</script>

</body>
</html>
