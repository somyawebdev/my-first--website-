<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Somya Interactive Wallpapers</title>
<style>
body{
    margin:0;
    font-family: 'Arial', sans-serif;
    text-align:center;
    background:#111827;
    color:white;
    transition: background 0.5s ease;
}
header{
    background:#22c55e;
    padding:30px;
    font-size:2.2rem;
    font-weight:bold;
    color:white;
}
button{
    margin:10px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    background:#3b82f6;
    color:white;
    transition:0.3s;
}
button:hover{
    transform:scale(1.1);
}
</style>
</head>
<body>

<header>Somya Interactive Wallpapers</header>

<h2>Click a button to change background wallpaper:</h2>
<button onclick="setWallpaper(0)">Wallpaper 1</button>
<button onclick="setWallpaper(1)">Wallpaper 2</button>
<button onclick="setWallpaper(2)">Wallpaper 3</button>
<button onclick="setWallpaper(3)">Wallpaper 4</button>
<button onclick="setWallpaper(4)">Wallpaper 5</button>

<script>
const wallpapers=[
    'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&q=80',
    'https://images.unsplash.com/photo-1499084732479-de2c02d45fc4?auto=format&fit=crop&w=800&q=80',
    'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80',
    'https://images.unsplash.com/photo-1517817743953-9b8e216b2a38?auto=format&fit=crop&w=800&q=80',
    'https://images.unsplash.com/photo-1495567720989-cebdbdd97913?auto=format&fit=crop&w=800&q=80'
];

function setWallpaper(index){
    document.body.style.backgroundImage=`url(${wallpapers[index]})`;
    document.body.style.backgroundSize='cover';
    document.body.style.backgroundRepeat='no-repeat';
}
</script>

</body>
</html>
