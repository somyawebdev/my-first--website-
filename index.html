<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Learning App</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f9ff; text-align: center; margin: 0; padding: 20px; }
        .header { background: #0284c7; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; border: 2px solid #e0e0e0; }
        .card:hover { transform: scale(1.05); background-color: #e0f2fe; }
        .card b { font-size: 28px; display: block; color: #0369a1; }
        .card span { font-size: 14px; color: #64748b; }
        h2 { color: #0369a1; border-bottom: 2px solid #bae6fd; padding-bottom: 10px; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Welcome to My Learning App 🌟</h1>
        <p>यहाँ सीखें Warriors, ABC, 123 और बहुत कुछ!</p>
    </div>

    <!-- 1. Warriors Section -->
    <h2>🛡️ Great Warriors</h2>
    <div class="grid" id="warriors-list">
        <!-- यहाँ योद्धाओं के नाम और आवाज़ -->
        <div class="card" onclick="speak('Maharana Pratap - The Brave King')">
            <b>⚔️</b> <span>Maharana Pratap</span>
        </div>
        <div class="card" onclick="speak('Chhatrapati Shivaji Maharaj')">
            <b>🚩</b> <span>Shivaji Maharaj</span>
        </div>
    </div>

    <!-- 2. English Alphabets with Voice -->
    <h2>🍎 English ABC (A-Z)</h2>
    <div class="grid" id="abc-list"></div>

    <!-- 3. Numbers 1-2-3 -->
    <h2>🔢 Numbers (1-10)</h2>
    <div class="grid" id="numbers-list"></div>

    <!-- 4. Hindi Varnamala -->
    <h2>🇮🇳 हिंदी वर्णमाला (क-ख-ग)</h2>
    <div class="grid" id="hindi-list"></div>

    <script>
        // आवाज़ वाला फंक्शन
        function speak(text, lang = 'en-US') {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = lang;
            speech.rate = 0.9;
            window.speechSynthesis.speak(speech);
        }

        // ABC List Generate करना
        const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const abcDiv = document.getElementById('abc-list');
        abc.forEach(l => {
            abcDiv.innerHTML += `<div class="card" onclick="speak('${l}')"><b>${l}</b></div>`;
        });

        // Numbers List
        const numDiv = document.getElementById('numbers-list');
        for(let i=1; i<=10; i++) {
            numDiv.innerHTML += `<div class="card" onclick="speak('${i}')"><b>${i}</b></div>`;
        }

        // Hindi List
        const hindi = ["क", "ख", "ग", "घ", "अ", "आ", "इ", "ई"];
        const hindiDiv = document.getElementById('hindi-list');
        hindi.forEach(h => {
            hindiDiv.innerHTML += `<div class="card" onclick="speak('${h}', 'hi-IN')"><b>${h}</b></div>`;
        });
    </script>

</body>
</html>
