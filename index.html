<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Learning Website</title>
    <style>
        /* CSS: Design Fixes */
        body {
            background-color: #fffde7; /* Light yellow background jaisa screenshot mein hai */
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 10px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        /* Banner Design */
        .banner {
            background: linear-gradient(to right, #ff9800, #ffc107);
            color: white;
            padding: 15px;
            border-radius: 50px;
            margin: 20px 10px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Video Section */
        .video-box {
            background: white;
            border: 4px solid #ff4d6d;
            border-radius: 20px;
            margin: 15px;
            padding: 10px;
            overflow: hidden;
        }

        /* Grid Layout (2 Columns) */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 10px;
        }

        /* Card Design */
        .card {
            background: white;
            border: 3px solid #ff4d6d; /* Pink/Red border */
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 140px;
            object-fit: contain; /* Cartoon images ko sahi fit karne ke liye */
            padding: 10px;
            background-color: #fff;
        }

        .card-text {
            border-top: 1px solid #eee;
            padding: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #333;
        }

    </style>
</head>
<body>

<div class="container">

    <!-- 1. Learning Section (A for Apple, 1, 2) -->
    <div class="grid-container">
        <div class="card">
            <img src="apple_cartoon.png" alt="Apple"> <!-- Yahan apni file ka naam check karein -->
            <div class="card-text">A for Apple</div>
        </div>
        <div class="card">
            <img src="one.png" alt="1">
            <div class="card-text">1 (One)</div>
        </div>
        <div class="card">
            <img src="two.png" alt="2">
            <div class="card-text">2 (Two)</div>
        </div>
    </div>

    <!-- 2. Video Section (Jo nahi chal raha tha) -->
    <div class="banner">📺 कहानियाँ और लोरियां</div>
    <div class="video-box">
        <!-- Local Video File: Agar video file folder mein hai toh 'video.mp4' likhein -->
        <video width="100%" controls>
            <source src="your_video_file.mp4" type="video/mp4">
            Aapka browser video support nahi karta.
        </div>
    </div>

    <!-- 3. Stories Section (Maharana Pratap etc.) -->
    <div class="grid-container">
        <!-- Maharana Pratap -->
        <div class="card">
            <img src="maharana_pratap.jpg" alt="Maharana Pratap">
            <div class="card-text">महाराणा प्रताप</div>
        </div>

        <!-- Shivaji Maharaj -->
        <div class="card">
            <img src="shivaji_maharaj.jpg" alt="Shivaji Maharaj">
            <div class="card-text">शिवाजी महाराज</div>
        </div>

        <!-- Ganesh Ji -->
        <div class="card">
            <img src="ganesh_ji.jpg" alt="Ganesh Ji">
            <div class="card-text">गणेश जी</div>
        </div>

        <!-- Ramayan -->
        <div class="card">
            <img src="ramayan.jpg" alt="Ramayan">
            <div class="card-text">रामायण</div>
        </div>
    </div>

</div>

</body>
</html>
