<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kids Learning World</title>

<style>

body{
font-family:Arial;
background:linear-gradient(45deg,#ff9a9e,#fad0c4);
text-align:center;
}

h1{
color:#ff4d4d;
}

.menu button{

padding:15px 20px;
margin:5px;
font-size:18px;
border:none;
border-radius:20px;
background:#ff6b6b;
color:white;
cursor:pointer;

}

.section{
display:none;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.btn{

background:#ffd93d;
padding:20px;
border-radius:20px;
font-size:20px;
border:none;
cursor:pointer;

}

img{
width:80px;
}

canvas{

border:3px solid black;

}

</style>

</head>

<body>

<h1>Kids Learning World</h1>

<div class="menu">

<button onclick="show('numbers')">Numbers</button>
<button onclick="show('hindi')">Hindi</button>
<button onclick="show('english')">English</button>
<button onclick="show('animals')">Animals</button>
<button onclick="show('colors')">Colors</button>
<button onclick="show('stories')">Stories</button>
<button onclick="show('rhymes')">Rhymes</button>
<button onclick="show('shapes')">Shapes</button>
<button onclick="show('drawing')">Drawing</button>

</div>

<!-- NUMBERS -->

<div id="numbers" class="section">

<h2>1 to 100 Numbers</h2>

<div class="grid" id="numbersGrid"></div>

</div>

<!-- HINDI -->

<div id="hindi" class="section">

<h2>क से ज्ञ</h2>

<div class="grid" id="hindiGrid"></div>

</div>

<!-- ENGLISH -->

<div id="english" class="section">

<h2>A to Z</h2>

<div class="grid" id="englishGrid"></div>

</div>

<!-- ANIMALS -->

<div id="animals" class="section">

<h2>Animals</h2>

<div class="grid">

<button class="btn" onclick="speak('Dog')">🐶<br>Dog</button>
<button class="btn" onclick="speak('Cat')">🐱<br>Cat</button>
<button class="btn" onclick="speak('Lion')">🦁<br>Lion</button>
<button class="btn" onclick="speak('Elephant')">🐘<br>Elephant</button>

</div>

</div>

<!-- COLORS -->

<div id="colors" class="section">

<h2>Colors</h2>

<div class="grid">

<button class="btn" onclick="speak('Red color')">🟥 Red</button>
<button class="btn" onclick="speak('Blue color')">🟦 Blue</button>
<button class="btn" onclick="speak('Green color')">🟩 Green</button>
<button class="btn" onclick="speak('Yellow color')">🟨 Yellow</button>

</div>

</div>

<!-- SHAPES -->

<div id="shapes" class="section">

<h2>Shapes</h2>

<div class="grid">

<button class="btn" onclick="speak('Circle')">⭕</button>
<button class="btn" onclick="speak('Square')">◼️</button>
<button class="btn" onclick="speak('Triangle')">🔺</button>
<button class="btn" onclick="speak('Star')">⭐</button>

</div>

</div>

<!-- RHYMES -->

<div id="rhymes" class="section">

<h2>Rhymes</h2>

<button class="btn" onclick="speak('Twinkle twinkle little star')">⭐ Twinkle</button>

<button class="btn" onclick="speak('Johnny johnny yes papa')">🍭 Johnny</button>

<button class="btn" onclick="speak('Wheels on the bus go round')">🚌 Wheels</button>

</div>

<!-- STORIES -->

<div id="stories" class="section">

<h2>Stories</h2>

<button class="btn" onclick="story('pratap')">Maharana Pratap</button>

<button class="btn" onclick="story('ramayan')">Ramayan</button>

<button class="btn" onclick="story('mahabharat')">Mahabharat</button>

<button class="btn" onclick="story('gita')">Bhagavad Gita</button>

<p id="storyText"></p>

</div>

<!-- DRAWING -->

<div id="drawing" class="section">

<h2>Drawing</h2>

<canvas id="canvas" width="300" height="300"></canvas>

<br>

<button onclick="clearCanvas()">Clear</button>

</div>

<script>

function show(id){

document.querySelectorAll('.section').forEach(s=>s.style.display='none')

document.getElementById(id).style.display='block'

}

function speak(text){

let speech=new SpeechSynthesisUtterance(text)

speech.lang="en-US"

speechSynthesis.speak(speech)

}

function story(type){

let text=""

if(type=="pratap")

text="Maharana Pratap was a brave king of Mewar."

if(type=="ramayan")

text="Ramayan is the story of Lord Rama."

if(type=="mahabharat")

text="Mahabharat is the great battle between Pandavas and Kauravas."

if(type=="gita")

text="Bhagavad Gita teaches us about duty."

document.getElementById("storyText").innerText=text

speak(text)

}

/* Numbers */

let numbers=document.getElementById("numbersGrid")

for(let i=1;i<=100;i++){

let b=document.createElement("button")

b.className="btn"

b.innerText=i

b.onclick=()=>speak(i)

numbers.appendChild(b)

}

/* Hindi */

let hindi=['क','ख','ग','घ','च','छ','ज','झ','ट','ठ','ड','ढ','त','थ','द','ध','न','प','फ','ब','भ','म','य','र','ल','व','श','ष','स','ह','क्ष','त्र','ज्ञ']

let grid=document.getElementById("hindiGrid")

hindi.forEach(h=>{

let b=document.createElement("button")

b.className="btn"

b.innerText=h

b.onclick=()=>speak(h)

grid.appendChild(b)

})

/* English */

let alpha="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("")

let egrid=document.getElementById("englishGrid")

alpha.forEach(a=>{

let b=document.createElement("button")

b.className="btn"

b.innerText=a

b.onclick=()=>speak(a)

egrid.appendChild(b)

})

/* Drawing */

let canvas=document.getElementById("canvas")

let ctx=canvas.getContext("2d")

let draw=false

canvas.onmousedown=()=>draw=true

canvas.onmouseup=()=>draw=false

canvas.onmousemove=e=>{

if(draw){

ctx.lineWidth=5

ctx.lineTo(e.offsetX,e.offsetY)

ctx.stroke()

}

}

function clearCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height)

}

</script>

</body>

    </html>
