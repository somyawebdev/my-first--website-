<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Learning World</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background-color: #f0f8ff; text-align: center; padding: 20px; }
        h1 { color: #ff4500; text-shadow: 2px 2px #ffd700; }
        .section { background: white; border-radius: 20px; padding: 20px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; padding: 10px; }
        
        /* बड़े और सुंदर बटन */
        button { 
            padding: 20px; font-size: 24px; cursor: pointer; border: none; 
            border-radius: 15px; background: #FFD700; transition: 0.3s;
            box-shadow: 0 4px #b8860b; font-weight: bold;
        }
        button:active { box-shadow: 0 0; transform: translateY(4px); }
        button:hover { background: #FFA500; transform: scale(1.1); }

        .story-card { background: #e6fffa; padding: 15px; border-radius: 10px; margin: 10px; cursor: pointer; }
        .canvas-area { border: 2px solid #000; background: white; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>🌟 Kids Learning Portal 🌟</h1>

    <!-- 1 to 100 Counting -->
    <div class="section">
        <h2>🔢 1 to 100 Counting</h2>
        <div class="grid" id="counting-grid"></div>
    </div>

    <!-- क to ज्ञ -->
    <div class="section">
        <h2>🕉️ हिंदी वर्णमाला (क से ज्ञ)</h2>
        <div class="grid" id="hindi-grid"></div>
    </div>

    <!-- A to Z -->
    <div class="section">
        <h2>🔤 ABC (A to Z)</h2>
        <div class="grid" id="abc-grid"></div>
    </div>

    <!-- Stories Section -->
    <div class="section">
        <h2>📖 कहानियाँ (Stories)</h2>
        <div class="story-card" onclick="speakStory('Maharana Pratap', 'महाराणा प्रताप मेवाड़ के महान हिंदू राजा थे। उनके घोड़े का नाम चेतक था।')">
            🛡️ महाराणा प्रताप की कहानी
        </div>
        <div class="story-card" onclick="speakStory('Ramayana', 'रामायण भगवान श्री राम की कहानी है। उन्होंने रावण को हराकर बुराई पर जीत पाई थी।')">
            🏹 रामायण की कहानी
        </div>
        <div class="story-card" onclick="speakStory('Bhagavad Gita', 'भगवत गीता में भगवान कृष्ण ने अर्जुन को धर्म का मार्ग दिखाया था।')">
            ☸️ भगवत गीता
        </div>
    </div>

    <!-- Manners -->
    <div class="section">
        <h2>🌈 Good & Bad Manners</h2>
        <button onclick="speak('Always help others')">🤝 Good: Help Others</button>
        <button onclick="speak('Do not fight')">🚫 Bad: Fighting</button>
    </div>

    <!-- Drawing Board -->
    <div class="section">
        <h2>✏️ Drawing Board</h2>
        <canvas id="paintCanvas" width="300" height="200" class="canvas-area"></canvas><br>
        <button onclick="clearCanvas()">Clear Canvas</button>
    </div>

    <script>
        // आवाज़ के लिए फंक्शन
        function speak(text) {
            let msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'hi-IN'; // हिंदी के लिए
            window.speechSynthesis.speak(msg);
        }

        function speakStory(title, content) {
            speak(title + ". " + content);
        }

        // 1-100 Counting Generator
        const countGrid = document.getElementById('counting-grid');
        for (let i = 1; i <= 100; i++) {
            let btn = document.createElement('button');
            btn.innerText = i;
            btn.onclick = () => speak(i);
            countGrid.appendChild(btn);
        }

        // A-Z Generator
        const abcGrid = document.getElementById('abc-grid');
        for (let i = 65; i <= 90; i++) {
            let char = String.fromCharCode(i);
            let btn = document.createElement('button');
            btn.innerText = char;
            btn.onclick = () => speak(char);
            abcGrid.appendChild(btn);
        }

        // क-ज्ञ List
        const hindiChars = ['क', 'ख', 'ग', 'घ', 'च', 'छ', 'ज', 'झ', 'ट', 'ठ', 'ड', 'ढ', 'त', 'थ', 'द', 'ध', 'न', 'प', 'फ', 'ब', 'भ', 'म', 'य', 'र', 'ल', 'व', 'श', 'ष', 'स', 'ह', 'क्ष', 'त्र', 'ज्ञ'];
        const hindiGrid = document.getElementById('hindi-grid');
        hindiChars.forEach(char => {
            let btn = document.createElement('button');
            btn.innerText = char;
            btn.onclick = () => speak(char);
            hindiGrid.appendChild(btn);
        });

        // Drawing Logic
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let painting = false;

        canvas.addEventListener('mousedown', () => painting = true);
        canvas.addEventListener('mouseup', () => { painting = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!painting) return;
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = 'red';
            ctx.lineTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    </script>
</body>
</html>
