<style>
body{
font-family:Arial;
text-align:center;
background:#f0f8ff;
}

.btn{
    padding: 12px 24px;
    margin: 8px;
    font-size: 18px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    background: blue(135deg, #ff9800, #f57c00);
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
}

.btn:hover {
    background: #e68900;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
}
</style>

<script>

function speak(text){

let speech = new SpeechSynthesisUtterance(text)

speech.lang = "hi-IN"

speech.rate = 0.9

speechSynthesis.speak(speech)

}

function story(type){

let text=""

if(type=="lionmouse")
text="एक शेर ने एक छोटे चूहे को पकड़ लिया। चूहे ने माफी मांगी और बाद में जाल काटकर शेर की जान बचाई।"

if(type=="crow")
text="एक प्यासा कौआ घड़े में पत्थर डालकर पानी ऊपर लाया और पानी पिया।"

if(type=="foxgrapes")
text="एक लोमड़ी अंगूर तक नहीं पहुँच पाई और बोली अंगूर खट्टे हैं।"

if(type=="antgrass")
text="चींटी मेहनत करती रही और टिड्डा खेलता रहा। सर्दी आने पर टिड्डे को पछताना पड़ा।"

if(type=="goldenegg")
text="एक मुर्गी रोज सोने का अंडा देती थी लेकिन लालच ने सब नष्ट कर दिया।"

if(type=="rabbittortoise")
text="एक तेज दौड़ने वाला खरगोश घमंड में सो गया और धीरे चलने वाला कछुआ दौड़ जीत गया।"

if(type=="boywolf")
text="एक लड़का बार-बार झूठ बोलता था कि भेड़िया आया। जब सच में भेड़िया आया तो कोई मदद के लिए नहीं आया।"

if(type=="greedydog")
text="एक लालची कुत्ते ने पानी में अपनी परछाई देखी और अपना मांस भी खो दिया।"

if(type=="farmer")
text="एक किसान ने अपने बेटों को मेहनत का महत्व सिखाया।"

if(type=="honesty")
text="एक ईमानदार लकड़हारे को भगवान ने सोने और चांदी की कुल्हाड़ी इनाम में दी।"

document.getElementById("storyText").innerText=text

speak(text)

}

</script>
