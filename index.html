<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Somya Interactive Pro Website</title>
<style>
body{
    font-family: 'Arial', sans-serif;
    margin:0; padding:0;
    text-align:center;
    background:#111827;
    color:white;
    transition: background 0.5s;
}

header{
    background: linear-gradient(90deg, #22c55e, #3b82f6);
    padding:40px 20px;
    font-size:2rem;
    font-weight:bold;
    color:white;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.container{
    max-width:800px;
    margin:40px auto;
    display:flex;
    flex-direction:column;
    gap:30px;
}

.card{
    background: rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    transition: transform 0.3s;
}

.card:hover{
    transform: translateY(-5px);
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    font-size:1rem;
    margin:10px;
    transition: 0.3s;
}

button:hover{
    opacity:0.8;
}

.wallpaper-btn{background:#22c55e; color:white;}
.gradient-btn{background:#3b82f6; color:white;}
.video-btn{background:#f59e0b; color:white;}

#videoPreview{
    width:320px;
    border-radius:10px;
    margin-top:20px;
}
</style>
</head>
<body>

<header>Somya Interactive Pro Website</header>

<div class="container">

<div class="card">
<h2>Wallpapers</h2>
<p>Click below buttons to change background wallpaper:</p>
<button class="wallpaper-btn" onclick="changeWallpaper('https://images.unsplash.com/photo-1501785888041-af3ef285b470')">Wallpaper 1</button>
<button class="wallpaper-btn" onclick="changeWallpaper('https://images.unsplash.com/photo-1518837695005-2083093ee35b')">Wallpaper 2</button>
<button class="wallpaper-btn" onclick="changeWallpaper('https://images.unsplash.com/photo-1470770841072-f978cf4d019e')">Wallpaper 3</button>
</div>

<div class="card">
<h2>Gradient Backgrounds</h2>
<p>Click below to change gradient background:</p>
<button class="gradient-btn" onclick="changeGradient('linear-gradient(90deg, #22c55e, #3b82f6)')">Green Blue</button>
<button class="gradient-btn" onclick="changeGradient('linear-gradient(90deg, #f43f5e, #f59e0b)')">Pink Orange</button>
<button class="gradient-btn" onclick="changeGradient('linear-gradient(90deg, #6366f1, #14b8a6)')">Purple Teal</button>
</div>

<div class="card">
<h2>Video Preview</h2>
<p>Click button to show dummy video preview:</p>
<video id="videoPreview" controls></video>
<br>
<button class="video-btn" onclick="showVideo()">Play Video</button>
</div>

</div>

    document.body.style.backgroundImage = `url(${url})`;
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundRepeat = "no-repeat";
}
